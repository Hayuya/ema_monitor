name: CBP501三相治験監視

on:
  schedule:
    # 毎時0分に実行 (UTC時間)
    - cron: '0 * * * *'

  # 手動実行も可能にする
  workflow_dispatch:
    inputs:
      debug_mode:
        description: 'デバッグモード（詳細ログ出力）'
        required: false
        default: 'false'
        type: boolean
      force_status_report:
        description: '強制ステータス報告'
        required: false
        default: 'false'
        type: boolean

jobs:
  monitor-cbp501:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 リポジトリのチェックアウト
      uses: actions/checkout@v4

    - name: 🐍 Python環境のセットアップ
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: 💾 依存関係のキャッシュ
      uses: actions/cache@v4
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: 📦 ライブラリのインストール
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🗂️ 前回データの復元
      uses: actions/cache@v4
      with:
        path: |
          execution_counter.txt
          cbp501_status.txt
        key: cbp501-monitor-data-${{ github.run_number }}
        restore-keys: |
          cbp501-monitor-data-

    - name: 🧬 CBP501監視アプリの実行
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        DEBUG_MODE: ${{ github.event.inputs.debug_mode || 'false' }}
        # main.py側で変更を検知した場合のみ通知するように改修することを想定
      run: |
        echo "🧬 CBP501三相治験監視アプリを開始します..."
        echo "⏰ 実行時刻: $(date)"
        python main.py
        echo "✅ CBP501監視アプリが完了しました"

    - name: 📝 JST 21:00 定期報告
      # JST 21:00 (UTC 12:00) にのみこのステップを実行
      if: github.event_name == 'schedule' && format('{0:HH}', utcNow) == '12'
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python -c "
        import requests, json, os
        from datetime import datetime, timedelta, timezone

        JST = timezone(timedelta(hours=+9))
        now_jst = datetime.now(JST)

        webhook_url = os.getenv('DISCORD_WEBHOOK_URL')
        if not webhook_url:
            print('❌ Discord Webhook URLが設定されていません')
            exit(1)

        payload = {
            'embeds': [{
                'title': '🔬 CBP501監視 | 定期報告',
                'description': f'**{now_jst.strftime(\"%Y年%m月%d日 %H:%M\")}** 時点\nシステムは正常に稼働中です。',
                'color': 0x3498DB, # Calm Blue
                'footer': {
                    'text': 'CBP501 Phase III Trial Monitor'
                },
                'timestamp': datetime.utcnow().isoformat()
            }]
        }
        response = requests.post(webhook_url, json=payload)
        if response.status_code == 204:
            print('✅ 定期報告の送信に成功しました')
        else:
            print(f'❌ 定期報告の送信に失敗: {response.status_code}')
            print(response.text)
        "

    - name: 📊 実行結果の確認
      if: always()
      run: |
        echo "📋 実行ログの概要:"
        if [ -f "cbp501_monitor.log" ]; then
          tail -10 cbp501_monitor.log
        fi
        if [ -f "execution_counter.txt" ]; then
          echo "実行回数: $(cat execution_counter.txt)"
        fi
        if [ -f "cbp501_status.txt" ]; then
          echo "CBP501ステータス: $(cat cbp501_status.txt)"
        fi

    - name: 🔗 Discord起動通知（初回実行時）
      if: github.run_number == 1
      env:
        DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      run: |
        python -c "
        import requests, json, os
        from datetime import datetime

        webhook_url = os.getenv('DISCORD_WEBHOOK_URL')
        if webhook_url:
            payload = {
                'embeds': [{
                    'title': '✅ CBP501監視システム | 起動完了',
                    'description': 'CBP501三相治験の監視を開始しました。\n更新を検知した場合、またはJST 21:00に定期報告を送信します。',
                    'color': 0x2ECC71, # Green
                    'timestamp': datetime.utcnow().isoformat(),
                    'footer': {
                        'text': 'CBP501 Phase III Trial Monitor'
                    }
                }]
            }
            response = requests.post(webhook_url, json=payload)
            if response.status_code == 204:
                print('✅ 起動通知の送信に成功しました')
            else:
                print(f'❌ 起動通知の送信に失敗: {response.status_code}')
        else:
            print('❌ Discord Webhook URLが設定されていません')
        "

    - name: 📤 ログファイルのアップロード（エラー時）
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: cbp501-error-logs-${{ github.run_number }}
        path: |
          cbp501_monitor.log
          *.txt
        retention-days: 7

    - name: 💾 データの保存
      if: always()
      uses: actions/cache/save@v4
      with:
        path: |
          execution_counter.txt
          cbp501_status.txt
        key: cbp501-monitor-data-${{ github.run_number }}
